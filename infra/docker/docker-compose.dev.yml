# VPS DEV Environment Docker Compose
# Usage: VERSION=dev docker compose -f docker-compose.dev.yml up -d

services:
  api:
    image: ghcr.io/${GITHUB_USER:-your-username}/my-saas-api:${VERSION:-dev}
    container_name: my-saas-dev-api
    restart: unless-stopped
    env_file:
      - .env
      - .secrets
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.my-saas-dev-api.rule=Host(`api.dev.${DOMAIN}`)"
      - "traefik.http.routers.my-saas-dev-api.entrypoints=websecure"
      - "traefik.http.routers.my-saas-dev-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.my-saas-dev-api.middlewares=security-headers,rate-limit"
      - "traefik.http.services.my-saas-dev-api.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    image: ghcr.io/${GITHUB_USER:-your-username}/my-saas-web:${VERSION:-dev}
    container_name: my-saas-dev-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.dev.${DOMAIN}
    depends_on:
      - api
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.my-saas-dev-web.rule=Host(`dev.${DOMAIN}`)"
      - "traefik.http.routers.my-saas-dev-web.entrypoints=websecure"
      - "traefik.http.routers.my-saas-dev-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.my-saas-dev-web.middlewares=security-headers"
      - "traefik.http.services.my-saas-dev-web.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: my-saas-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: my-saas-dev-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true
